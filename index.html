<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纸箱大逃亡 — 3D 捉迷藏 Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0e1016; }
  body { font-family: "Segoe UI", "Microsoft YaHei", sans-serif; color: #e8eaf0; }
  canvas { display: block; }

  .hidden { display: none !important; }

  /* ── 菜单 / 结算覆盖层 ───────────────────── */
  #overlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(10, 12, 18, 0.88); backdrop-filter: blur(6px);
    text-align: center; padding: 24px;
  }
  #overlay h1 { font-size: 52px; letter-spacing: 6px; margin-bottom: 8px; color: #ffd166; text-shadow: 0 4px 24px rgba(255, 209, 102, .35); }
  #overlay h2 { font-size: 18px; font-weight: 400; color: #8b93a7; margin-bottom: 28px; }
  #overlay .rules {
    max-width: 560px; text-align: left; line-height: 1.9; font-size: 15px; color: #c4cadb;
    background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09);
    border-radius: 12px; padding: 18px 26px; margin-bottom: 30px;
  }
  #overlay .rules b { color: #ffd166; }
  #startBtn {
    font-size: 20px; letter-spacing: 4px; padding: 14px 52px; cursor: pointer;
    color: #0e1016; background: #ffd166; border: none; border-radius: 999px;
    transition: transform .15s, box-shadow .15s;
  }
  #startBtn:hover { transform: scale(1.06); box-shadow: 0 6px 30px rgba(255,209,102,.45); }
  #resultTitle { font-size: 56px; margin-bottom: 12px; }
  #resultTitle.won { color: #7bd88f; } #resultTitle.lost { color: #ff5d5d; }
  #resultDesc { color: #8b93a7; margin-bottom: 30px; font-size: 16px; }

  /* ── HUD ────────────────────────────────── */
  #hud { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
  #timer {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    font-size: 40px; font-weight: 700; font-variant-numeric: tabular-nums;
    text-shadow: 0 2px 10px rgba(0,0,0,.6);
  }
  #timer.urgent { color: #ff5d5d; }
  #phase {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    font-size: 15px; color: #9aa3b8; letter-spacing: 2px;
  }
  #alert {
    position: absolute; top: 110px; left: 50%; transform: translateX(-50%);
    font-size: 22px; font-weight: 700; color: #ff5d5d; letter-spacing: 3px;
    animation: blink .5s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: .15; } }
  #mates { position: absolute; top: 20px; left: 22px; font-size: 14px; color: #9aa3b8; line-height: 1.7; }
  #hint {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
    font-size: 13px; color: #6d7590; letter-spacing: 1px; text-align: center; line-height: 1.8;
  }
  #noise {
    position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
    font-size: 14px; color: #ffb454; letter-spacing: 2px;
  }
  #crosshair {
    position: fixed; top: 50%; left: 50%; z-index: 10; pointer-events: none;
    width: 6px; height: 6px; margin: -3px 0 0 -3px; border-radius: 50%;
    background: rgba(255,255,255,.85); box-shadow: 0 0 6px rgba(0,0,0,.8);
  }
</style>
</head>
<body>
  <!-- 菜单 / 结算覆盖层 -->
  <div id="overlay">
    <h1>纸箱大逃亡</h1>
    <h2>3D 捉迷藏 Demo · Three.js + WebGL</h2>
    <div class="rules" id="rulesText">
      <b>你是躲藏者。</b>开局有 <b>20 秒</b>找地方藏好，之后寻找者出动，活过 <b>120 秒</b>就赢。<br>
      🏃 <b>WASD</b> 移动 · <b>Shift</b> 冲刺（会发出噪音，把寻找者引过来！）<br>
      🤫 <b>C</b> 蹲伏：更慢，但更难被发现<br>
      📦 <b>E</b> 变身纸箱：原地伪装成箱子，动一下就露馅<br>
      👁 躲开红色的视线锥，别被追上。三个蓝色同伴会帮你分担注意力。
    </div>
    <button id="startBtn">开始游戏</button>
  </div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="timer">--</div>
    <div id="phase"></div>
    <div id="alert" class="hidden">!! 被发现了，快跑 !!</div>
    <div id="mates"></div>
    <div id="noise" class="hidden">📢 冲刺噪音引来了寻找者！</div>
    <div id="hint">WASD 移动 · Shift 冲刺 · C 蹲伏 · E 变身纸箱 · Esc 释放鼠标</div>
  </div>
  <div id="crosshair" class="hidden"></div>

  <script type="importmap">
    { "imports": { "three": "./lib/three.module.js" } }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
